
<canvas id="c" width="700" height="700" style="width:100%;max-width:700px;display:block;margin:0 auto;background:#0a0a12;border-radius:12px;"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 700, H = 700, CX = 350, CY = 370;
const R_MIN = 80, R_MAX = 320;
const ANGLE = Math.PI / 4;
const N = 100;
const DURATION = 15000;
let startTime = null;

const particles = Array.from({length: N}, (_, i) => {
  const isSimple = i < 70;
  const spreadAngle = (Math.random() - 0.5) * 0.18;
  const r0 = R_MIN + (R_MAX - R_MIN) * 0.48 + (Math.random() - 0.5) * 14;
  const finalR = isSimple
    ? R_MIN + (R_MAX - R_MIN) * 0.08 + Math.random() * (R_MAX - R_MIN) * 0.22
    : R_MIN + (R_MAX - R_MIN) * 0.62 + Math.random() * (R_MAX - R_MIN) * 0.34;
  const finalAngleSpread = isSimple
    ? (Math.random() - 0.5) * 0.22
    : (Math.random() - 0.5) * 0.38;
  return {
    isSimple,
    r0,
    finalR,
    startAngle: ANGLE + (Math.random() - 0.5) * 0.04,
    finalAngle: ANGLE + finalAngleSpread,
    phase: Math.random() * Math.PI * 2,
    flickerSpeed: 1.5 + Math.random() * 2.5,
    size: isSimple ? 2.8 + Math.random() * 1.4 : 2.2 + Math.random() * 1.2,
    opacity: isSimple ? 0.75 + Math.random() * 0.25 : 0.3 + Math.random() * 0.3,
  };
});

function easeInOut(t) {
  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function getSortProgress(t) {
  if (t < 3000) return 0;
  if (t > 8000) return 1;
  return easeInOut((t - 3000) / 5000);
}

function draw(timestamp) {
  if (!startTime) startTime = timestamp;
  const elapsed = (timestamp - startTime) % DURATION;
  const t = elapsed;
  const sortP = getSortProgress(t);
  const textAlpha = t > 8000 ? Math.min(1, (t - 8000) / 1500) : 0;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid rings
  for (let r = 60; r <= 340; r += 40) {
    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Angular ray
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(CX, CY);
  const rayX = CX + Math.cos(ANGLE) * 350;
  const rayY = CY - Math.sin(ANGLE) * 350;
  ctx.lineTo(rayX, rayY);
  ctx.strokeStyle = 'rgba(100,220,120,0.18)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  // r_min boundary
  ctx.beginPath();
  ctx.arc(CX, CY, R_MIN, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(100,220,120,0.55)';
  ctx.lineWidth = 1.2;
  ctx.setLineDash([5, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // r_max boundary
  ctx.beginPath();
  ctx.arc(CX, CY, R_MAX, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(100,220,120,0.18)';
  ctx.lineWidth = 0.8;
  ctx.setLineDash([3, 6]);
  ctx.stroke();
  ctx.setLineDash([]);

  // r_min label
  ctx.save();
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(100,220,120,0.7)';
  const lx = CX + Math.cos(ANGLE + 0.35) * (R_MIN + 6);
  const ly = CY - Math.sin(ANGLE + 0.35) * (R_MIN + 6);
  ctx.fillText('r_min = 5.0 (Dense Core)', CX - R_MIN - 2, CY - 6);
  ctx.restore();

  // r_max label
  ctx.save();
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(100,220,120,0.35)';
  ctx.fillText('r_max = 20.0 (Diffuse Shell)', CX - R_MAX + 6, CY - R_MAX + 14);
  ctx.restore();

  // Class angle label
  ctx.save();
  ctx.font = '12px monospace';
  ctx.fillStyle = 'rgba(100,220,120,0.8)';
  const lbx = CX + Math.cos(ANGLE) * (R_MAX + 18);
  const lby = CY - Math.sin(ANGLE) * (R_MAX + 18);
  ctx.fillText('45° (Class)', lbx - 20, lby - 6);
  ctx.restore();

  // Epoch label
  ctx.save();
  ctx.font = '500 13px sans-serif';
  ctx.fillStyle = 'rgba(200,255,200,0.7)';
  if (t < 3000) {
    ctx.fillText('Epoch 0 — Static baseline (Decoupled)', 18, 28);
  } else if (t < 8000) {
    ctx.fillText('Uncertainty sorting active…', 18, 28);
  } else {
    ctx.fillText('Final state — Radial feature band', 18, 28);
  }
  ctx.restore();

  // Particles
  particles.forEach((p, i) => {
    const r = lerp(p.r0, p.finalR, sortP);
    const a = lerp(p.startAngle, p.finalAngle, sortP);
    const px = CX + Math.cos(a) * r;
    const py = CY - Math.sin(a) * r;

    const flicker = p.isSimple ? 1 : 0.55 + 0.45 * Math.sin(t * 0.001 * p.flickerSpeed + p.phase);
    const alpha = p.opacity * flicker;

    if (p.isSimple) {
      // Solid bright
      ctx.beginPath();
      ctx.arc(px, py, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(80,230,120,${alpha})`;
      ctx.fill();
      // soft glow
      ctx.beginPath();
      ctx.arc(px, py, p.size * 2.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(80,230,120,${alpha * 0.18})`;
      ctx.fill();
    } else {
      // Hollow / glitchy
      ctx.beginPath();
      ctx.arc(px, py, p.size + 0.6, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(80,230,120,${alpha * 0.9})`;
      ctx.lineWidth = 0.9;
      ctx.stroke();
      // glitch cross
      const gc = Math.sin(t * 0.003 * p.flickerSpeed + p.phase);
      if (gc > 0.3) {
        ctx.beginPath();
        ctx.moveTo(px - 3, py); ctx.lineTo(px + 3, py);
        ctx.moveTo(px, py - 3); ctx.lineTo(px, py + 3);
        ctx.strokeStyle = `rgba(80,230,120,${alpha * 0.5})`;
        ctx.lineWidth = 0.7;
        ctx.stroke();
      }
    }
  });

  // Activation pulse ring at 3s
  if (t > 2800 && t < 4200) {
    const pulseT = (t - 2800) / 1400;
    const pulseR = lerp(20, 340, pulseT);
    const pulseA = 1 - pulseT;
    ctx.beginPath();
    ctx.arc(CX, CY, pulseR, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(100,255,140,${pulseA * 0.45})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Center dot
  ctx.beginPath();
  ctx.arc(CX, CY, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(200,255,200,0.5)';
  ctx.fill();

  // Final text overlay
  if (textAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = textAlpha;
    const tw = 460;
    const tx = CX - tw / 2;
    const ty = H - 52;
    ctx.fillStyle = 'rgba(10,10,18,0.72)';
    ctx.beginPath();
    roundRect(ctx, tx - 10, ty - 22, tw + 20, 38, 8);
    ctx.fill();
    ctx.font = '500 14px sans-serif';
    ctx.fillStyle = 'rgba(100,240,130,1)';
    ctx.textAlign = 'center';
    ctx.fillText('Dynamic DistArc: Unsupervised Semantic Hardness Sorting', CX, ty + 8);
    ctx.restore();
  }

  // Legend
  ctx.save();
  ctx.font = '12px monospace';
  ctx.fillStyle = 'rgba(100,230,120,0.85)';
  ctx.beginPath();
  ctx.arc(W - 140, H - 60, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(200,255,200,0.65)';
  ctx.fillText('Simple/Canonical (70%)', W - 130, H - 57);

  ctx.beginPath();
  ctx.arc(W - 140, H - 38, 4, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(100,230,120,0.7)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = 'rgba(200,255,200,0.45)';
  ctx.fillText('Complex/Occluded (30%)', W - 130, H - 35);
  ctx.restore();

  requestAnimationFrame(draw);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

requestAnimationFrame(draw);
</script>
